# =========================
# THEME
# =========================
theme: jekyll-theme-chirpy

lang: en
timezone: Africa/Cairo

# =========================
# SITE INFO
# =========================
title: r2cook
tagline: Red Teaming | CTFs | OSCP Journey

description: >-
  Cybersecurity blog by r2cook featuring CTF writeups, red teaming notes, OSCP preparation, and penetration testing research.

url: "https://r2cook.github.io"
baseurl: ""

# =========================
# SOCIAL / SEO
# =========================
github:
  username: r2cook

twitter:
  username: 0xr2cook

social:
  name: r2cook
  email: r2cook@gmail.com
  links:
    - https://twitter.com/0xr2cook
    - https://github.com/r2cook

# =========================
# THEME SETTINGS
# =========================
theme_mode: dark
toc: true
paginate: 10

avatar: /assets/img/logo.png

# =========================
# ANALYTICS
# =========================
analytics:
  google:
    id: G-CQHH3DZ94X

pageviews:
  provider:

# =========================
# COMMENTS (disabled)
# =========================
comments:
  provider:

# =========================
# PWA
# =========================
pwa:
  enabled: true
  cache:
    enabled: true

# =========================
# SEO CLEAN CONTROL
# =========================
defaults:

  # POSTS (INDEXED)
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
      sitemap: true

  # PAGES (INDEXED)
  - scope:
      path: ""
      type: pages
    values:
      sitemap: true

  # TABS
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

  # DRAFTS
  - scope:
      path: _drafts
    values:
      comments: false

  # 🚨 IMPORTANT: TAGS = NOINDEX
  - scope:
      path: ""
      type: tags
    values:
      sitemap: false
      robots: noindex

  # 🚨 IMPORTANT: CATEGORIES = NOINDEX
  - scope:
      path: ""
      type: categories
    values:
      sitemap: false
      robots: noindex

# =========================
# ARCHIVES
# =========================
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# =========================
# SASS
# =========================
sass:
  style: compressed

# =========================
# EXCLUDES
# =========================
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - tools
  - docs

# =========================
# KRAMDOWN
# =========================
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true